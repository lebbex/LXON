<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LXON</title>
	<link rel="icon" href="/ressources/icon.png" type="image/x-icon">
	<link rel="stylesheet" href="https://unpkg.com/lenis@1.3.23/dist/lenis.css">
	<link rel="stylesheet" href="/ressources/styles.css">
</head>

<body>

	<canvas id="noise-canvas"></canvas>

	<a href="https://lebbex.com" class="site-icon">
		<img src="/ressources/icon.png" alt="Lebbex">
	</a>

	

	<script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>
	<script src="/ressources/bg.js"></script>
	<script>
		const lenis = new Lenis({
			lerp: 0.1,
			wheelMultiplier: 0.5,
			touchMultiplier: 1.0,
			syncTouch: true,
			touchInertiaExponent: 10000,
		});
		
		bg.init([-0.05, -0.07, -0.12], [0.25, 0.3, 0.4], lenis);
	</script>

</body>

</html>
